spring.application.name=pt17
server.port=${SERVER_PORT:9090}

spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/pt17_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.h2.console.enabled=false
app.seed.enabled=false
app.jwt.secret=${JWT_SECRET:pt17-development-secret-key-change-me-32chars-minimum}
app.frontend.origin=${FRONTEND_ORIGIN:http://localhost:5173}
app.notifications.enabled=${NOTIFICATIONS_ENABLED:true}
app.upload.dir=${UPLOAD_DIR:uploads}
app.mail.enabled=${MAIL_ENABLED:false}
app.mail.from-address=${MAIL_FROM_ADDRESS:}
app.mail.from-name=${MAIL_FROM_NAME:PT17 Support}
app.ai.enabled=${AI_ENABLED:true}
app.ai.openai.api-key=${OPENAI_API_KEY:}
app.ai.openai.model=${OPENAI_MODEL:gpt-5.5}
app.ai.openai.url=${OPENAI_API_URL:https://api.openai.com/v1/responses}

spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.protocol=smtp
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.ssl.enable=${MAIL_SMTP_SSL:false}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:true}
spring.mail.properties.mail.smtp.starttls.required=${MAIL_SMTP_STARTTLS_REQUIRED:true}
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
