spring.application.name=demo
server.port=${SERVER_PORT:9090}
spring.datasource.url=jdbc:h2:mem:demo;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.h2.console.enabled=true
app.jwt.secret=${JWT_SECRET:pt17-development-secret-key-change-me-32chars-minimum}
app.frontend.origin=${FRONTEND_ORIGIN:http://localhost:5173}
app.notifications.enabled=${NOTIFICATIONS_ENABLED:true}
app.upload.dir=${UPLOAD_DIR:uploads}
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
